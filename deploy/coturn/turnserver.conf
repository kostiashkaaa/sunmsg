# coturn configuration for SUNmessenger
# Replace YOUR_DOMAIN and YOUR_PUBLIC_IP with real values

listening-port=3478
tls-listening-port=5349

# Bind to all interfaces
listening-ip=0.0.0.0

# Public IP of the server (required for NAT traversal)
external-ip=YOUR_PUBLIC_IP

realm=YOUR_DOMAIN
server-name=YOUR_DOMAIN

# HMAC-based ephemeral credentials (must match TURN_SECRET in Flask .env)
use-auth-secret
static-auth-secret=CHANGE_ME_STRONG_SECRET_HERE

# TLS certificate (Let's Encrypt recommended)
cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# Quota & limits
total-quota=300
bps-capacity=0
stale-nonce=600

# Disable plain TCP relay (force TLS/DTLS)
no-tcp-relay

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Fingerprint on TURN messages
fingerprint

# No loopback relay (security)
no-loopback-peers
no-multicast-peers

# Relay port range for WebRTC RTP/RTCP
min-port=40000
max-port=49999
