# coturn configuration for SUNmessenger
# Replace YOUR_DOMAIN and YOUR_PUBLIC_IP with real values.
#
# SECURITY NOTE: TURN credentials are short-lived HMAC tokens issued by the
# Flask app at /call/ice-config. Any logged-in user can read them and use the
# relay until they expire. The quotas + denied-peer-ip rules below limit
# blast radius from credential leak / amplification abuse. Do NOT relax
# these without a clear reason; pair changes with mitigations in
# .env.example (TURN_CREDENTIAL_TTL_SECONDS) and in the app config.

listening-port=3478
tls-listening-port=5349

# Bind to all interfaces.
listening-ip=0.0.0.0

# Public IP of the server (required for NAT traversal).
external-ip=YOUR_PUBLIC_IP

realm=YOUR_DOMAIN
server-name=YOUR_DOMAIN

# HMAC-based ephemeral credentials (must match TURN_SECRET in Flask .env).
use-auth-secret
static-auth-secret=CHANGE_ME_STRONG_SECRET_HERE

# TLS certificate (Let's Encrypt recommended).
cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# === Quotas & limits ========================================================
# user-quota: max simultaneous allocations per HMAC credential. 12 covers a
# single user across multiple devices (laptop, phone, multiple tabs) without
# letting a leaked credential proxy hundreds of connections.
user-quota=12
# total-quota: server-wide allocation cap. Pick a value matched to expected
# concurrent call count × ~3 (for ICE redundancy). 1200 is reasonable for a
# beta-scale deployment; raise as traffic grows.
total-quota=1200
# max-bps: per-session bandwidth ceiling (~2 Mbit/s). Sized for one video
# call; abusers using TURN as a generic proxy hit this cap immediately.
max-bps=2000000
# bps-capacity: 0 = unlimited aggregate throughput. Set a hard cap (e.g.
# 200000000 for ~200 Mbit/s server-wide) once you measure baseline traffic.
bps-capacity=0
# stale-nonce: rotate the WebRTC long-term nonce every 10 minutes. Limits
# replay even if a single STUN/TURN message is captured.
stale-nonce=600

# === Transport hardening =====================================================
# Disable plain TCP relay (force TLS/DTLS for relay traffic).
no-tcp-relay
# No loopback / link-local / multicast relays. Closes SSRF vectors where an
# attacker tries to bounce traffic to localhost services or LAN-only hosts.
no-loopback-peers
no-multicast-peers
# Block relay attempts to RFC1918 / RFC6890 private space. Without these,
# a TURN-as-proxy attacker can pivot to internal admin panels, metadata
# services, or k8s control-plane endpoints reachable from the relay host.
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=::1-::1

# === Misc ====================================================================
# Fingerprint on TURN messages (mandatory for some clients).
fingerprint

# Relay port range for WebRTC RTP/RTCP. Must be opened on the host firewall.
min-port=40000
max-port=49999

# Logging. Rotate via logrotate; verbose helps incident triage.
log-file=/var/log/coturn/turnserver.log
verbose

# Disable CLI-over-network. Keep telnetd inside the host (localhost only).
no-cli
# If you must enable CLI for debugging, bind it strictly to loopback:
#   cli-ip=127.0.0.1
#   cli-port=5766
#   cli-password=<strong-password>
