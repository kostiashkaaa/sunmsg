server {
    listen 80;
    server_name sunmessenger.ru www.sunmessenger.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sunmessenger.ru www.sunmessenger.ru;

    ssl_certificate /etc/letsencrypt/live/sunmessenger.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sunmessenger.ru/privkey.pem;

    client_max_body_size 100m;

    error_page 500 502 503 504 /errors/502.html;

    location = /errors/502.html {
        root /srv/sunmessenger/shared;
        internal;
        add_header Cache-Control "no-store" always;
    }

    location /static/ {
        alias /srv/sunmessenger/current/static/;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        proxy_intercept_errors on;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }
}
