limit_req_zone $binary_remote_addr zone=sun_socket_io:20m rate=5r/s;
limit_req_zone $binary_remote_addr zone=sun_sensitive_api:20m rate=30r/m;
limit_req_zone $binary_remote_addr zone=sun_media_upload:20m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=sun_conn_per_ip:20m;

map $http_upgrade $sun_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name sunmessenger.ru www.sunmessenger.ru sun.445231.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sunmessenger.ru www.sunmessenger.ru sun.445231.xyz;

    ssl_certificate /etc/letsencrypt/live/sunmessenger.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sunmessenger.ru/privkey.pem;

    client_max_body_size 100m;
    limit_req_status 429;
    limit_conn_status 429;

    error_page 500 502 503 504 /errors/502.html;

    location = /errors/502.html {
        root /srv/sunmessenger/shared;
        internal;
        add_header Cache-Control "no-store" always;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        limit_req zone=sun_socket_io burst=60 nodelay;
        limit_conn sun_conn_per_ip 30;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $sun_connection_upgrade;
        proxy_read_timeout 60s;
    }

    location ~ ^/(api/(get_challenge|login_challenge|login_totp|register_client|get_register_challenge|passkey/login/options|passkey/login/verify|passkeys/register/options|passkeys/register/verify)|send_request|send_request_by_username|u/[^/]+/start|api/chats/group/(create|add_members|invite-link|invite-link/revoke|upload_avatar))$ {
        limit_req zone=sun_sensitive_api burst=20 nodelay;
        proxy_intercept_errors on;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }

    location ~ ^/(upload_avatar|upload_chat_media)$ {
        limit_req zone=sun_media_upload burst=20 nodelay;
        limit_conn sun_conn_per_ip 10;
        proxy_intercept_errors on;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_intercept_errors on;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }
}
