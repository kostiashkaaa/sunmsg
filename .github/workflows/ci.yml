name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunmessenger_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sunmessenger_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sunmessenger_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sunmessenger_test_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-production.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare test database
        run: |
          python - <<'PY'
          import psycopg

          conn = psycopg.connect(
              "postgresql://postgres:postgres@127.0.0.1:5432/postgres",
              autocommit=True,
          )
          try:
              with conn.cursor() as cur:
                  cur.execute(
                      "SELECT 1 FROM pg_database WHERE datname = %s",
                      ("sunmessenger_test_ci",),
                  )
                  if cur.fetchone() is None:
                      cur.execute('CREATE DATABASE "sunmessenger_test_ci"')
          finally:
              conn.close()
          PY

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Dependency audit (production requirements)
        run: python manage.py pip-audit --requirements requirements-production.txt
