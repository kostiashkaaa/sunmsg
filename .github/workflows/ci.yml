name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sunmessenger_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sunmessenger_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sunmessenger_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sunmessenger_test_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-production.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Prepare test database
        run: python scripts/prepare_test_database.py

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Upload visual regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          path: tests/.visual_artifacts/
          include-hidden-files: true
          if-no-files-found: ignore

      - name: Dependency audit (production requirements)
        run: python manage.py pip-audit --requirements requirements-production.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server-mediasoup/package-lock.json

      - name: Dependency audit (mediasoup Node service)
        working-directory: server-mediasoup
        run: npm audit --omit=dev --audit-level=moderate
