name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging') }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging') }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_BASE_PATH: /srv/sunmessenger
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release archive
        run: |
          tar -czf release.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=.venv \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.runtime \
            --exclude=.tmp_* \
            --exclude=storage/backups \
            --exclude=storage/chat_media \
            .

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: release.tar.gz
          target: ${{ env.DEPLOY_BASE_PATH }}/artifacts/${{ env.DEPLOY_SHA }}
          overwrite: true

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: deploy/scripts/deploy_release.sh
          target: ${{ env.DEPLOY_BASE_PATH }}/shared
          strip_components: 2
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            chmod +x /srv/sunmessenger/shared/deploy_release.sh
            /srv/sunmessenger/shared/deploy_release.sh "${{ env.DEPLOY_SHA }}" "${{ env.DEPLOY_ENV }}"
