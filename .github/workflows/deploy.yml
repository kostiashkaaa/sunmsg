name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_BASE_PATH: /srv/sunmessenger
      DEPLOY_SSH_HOST: 92.113.150.115
      DEPLOY_SSH_PORT: "22"
      DEPLOY_SSH_USER: root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release archive
        run: |
          tar -czf /tmp/release.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=.venv \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=.runtime \
            --exclude=.tmp_* \
            --exclude=storage/backups \
            --exclude=storage/chat_media \
            --exclude=release.tar.gz \
            .
          cp /tmp/release.tar.gz ./release.tar.gz

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SSH_HOST }}
          username: ${{ env.DEPLOY_SSH_USER }}
          password: ${{ secrets.SUN_DEPLOY_SSH_PASSWORD }}
          port: ${{ env.DEPLOY_SSH_PORT }}
          source: release.tar.gz
          target: ${{ env.DEPLOY_BASE_PATH }}/artifacts/${{ env.DEPLOY_SHA }}
          overwrite: true

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SSH_HOST }}
          username: ${{ env.DEPLOY_SSH_USER }}
          password: ${{ secrets.SUN_DEPLOY_SSH_PASSWORD }}
          port: ${{ env.DEPLOY_SSH_PORT }}
          source: deploy/scripts/deploy_release.sh
          target: ${{ env.DEPLOY_BASE_PATH }}/shared
          strip_components: 2
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SSH_HOST }}
          username: ${{ env.DEPLOY_SSH_USER }}
          password: ${{ secrets.SUN_DEPLOY_SSH_PASSWORD }}
          port: ${{ env.DEPLOY_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            chmod +x /srv/sunmessenger/shared/deploy_release.sh
            /srv/sunmessenger/shared/deploy_release.sh "${{ env.DEPLOY_SHA }}" "${{ env.DEPLOY_ENV }}"
