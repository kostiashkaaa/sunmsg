<!DOCTYPE html>
<html lang="{{ ui_language|default('ru') }}">
<head>
    <link rel="manifest" href="{{ asset_url('manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ asset_url('icons/icon-192x192.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="sun">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="description" content="SUN Messenger — поддержка и обратная связь">
    <title>sun · Поддержка</title>
    <link rel="icon" href="{{ asset_url('icons/favicon-32x32.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ asset_url('vendor/fonts.css') }}">
    <link rel="stylesheet" href="{{ asset_url('style.css') }}">
    <link rel="stylesheet" href="{{ asset_url('pages/support-feedback.css') }}">
    <script src="{{ asset_url('interface-theme.js') }}"></script>
    <script src="{{ asset_url('pages/support-feedback.js') }}" defer></script>
</head>
<body class="support-feedback-body" data-ui-language="{{ ui_language|default('ru') }}">
<div class="support-feedback-orb support-feedback-orb-1" aria-hidden="true"></div>
<div class="support-feedback-orb support-feedback-orb-2" aria-hidden="true"></div>

<main class="support-feedback-shell">
    <section class="support-feedback-panel sun-surface-enter">
        <div class="support-feedback-topline">
            <span class="support-feedback-code">support channel</span>
            <a class="support-feedback-back" href="{{ '/chat' if user_id else '/' }}">{{ 'В чат' if user_id else 'Ко входу' }}</a>
        </div>

        <header class="support-feedback-copy">
            <p class="support-feedback-eyebrow">SUN Messenger</p>
            <h1>Поддержка и обратная связь</h1>
            <p class="support-feedback-description">
                Опишите проблему или задайте вопрос. Запрос попадёт в модераторскую консоль без доступа к вашей личной переписке.
            </p>
        </header>

        <div class="support-feedback-note">
            <span>Что ускоряет обработку</span>
            <strong>Точная тема, шаги воспроизведения и контакт для ответа.</strong>
        </div>

        <form
            id="supportFeedbackForm"
            class="support-feedback-form"
            data-is-auth-user="{{ '1' if user_id else '0' }}"
            data-auth-username="{{ username or '' }}"
        >
            <input type="hidden" id="supportSource" name="source_page" value="support_page">

            <div class="support-feedback-grid">
                <div class="support-feedback-field">
                    <label for="supportCategory">Категория</label>
                    <select id="supportCategory" name="category">
                        <option value="bug">Ошибка</option>
                        <option value="performance">Производительность</option>
                        <option value="registration">Регистрация</option>
                        <option value="login">Вход</option>
                        <option value="access">Доступ</option>
                        <option value="feature">Функция</option>
                        <option value="security">Безопасность</option>
                        <option value="other">Другое</option>
                    </select>
                </div>

                <div class="support-feedback-field">
                    <label for="supportUsername">Имя пользователя</label>
                    <input
                        id="supportUsername"
                        name="username"
                        value="{{ username or '' }}"
                        maxlength="120"
                        placeholder="ваш_username"
                        autocomplete="username"
                        {% if user_id %}readonly{% endif %}
                    >
                </div>

                <div class="support-feedback-field">
                    <label for="supportEmail">Эл. почта</label>
                    <input id="supportEmail" name="contact_email" maxlength="200" placeholder="name@example.com" autocomplete="email">
                </div>

                <div class="support-feedback-field">
                    <label for="supportHandle">Контакт для связи</label>
                    <input id="supportHandle" name="contact_handle" maxlength="120" placeholder="@telegram / @username / другой контакт">
                </div>

                <div class="support-feedback-field support-feedback-field-full">
                    <label for="supportSubject">Тема</label>
                    <input id="supportSubject" name="subject" maxlength="160" placeholder="Кратко: что случилось" required>
                </div>

                <div class="support-feedback-field support-feedback-field-full">
                    <label for="supportBody">Подробности</label>
                    <textarea
                        id="supportBody"
                        name="message"
                        maxlength="8000"
                        placeholder="Опишите шаги, ожидаемое поведение и что получили фактически."
                        required
                    ></textarea>
                </div>
            </div>

            <div class="support-feedback-actions">
                <p class="support-feedback-status" id="supportStatus" aria-live="polite"></p>
                <button type="submit" class="support-feedback-submit" id="supportSubmitBtn">Отправить запрос</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
