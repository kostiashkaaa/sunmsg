<link rel="manifest" href="{{ asset_url('manifest.json') }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ asset_url('icons/apple-touch-icon.png') }}">
<link rel="icon" href="{{ asset_url('icons/favicon-32x32.png') }}" sizes="32x32" type="image/png">
<link rel="icon" href="{{ asset_url('icons/favicon-16x16.png') }}" sizes="16x16" type="image/png">
<link rel="mask-icon" href="{{ asset_url('icons/safari-pinned-tab.svg') }}" color="#c58a22">
<meta name="application-name" content="SUN Messenger">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SUN">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f7f4ee" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#101815" media="(prefers-color-scheme: dark)">
<meta name="background-color" content="#f7f4ee">
<meta name="msapplication-TileColor" content="#f7f4ee">
<meta name="msapplication-TileImage" content="{{ asset_url('icons/mstile-150x150.png') }}">
<meta name="color-scheme" content="light dark">
<script nonce="{{ csp_nonce }}">
(() => {
    const root = document.documentElement;
    const standalone = window.navigator?.standalone === true
        || window.matchMedia?.('(display-mode: standalone)')?.matches
        || window.matchMedia?.('(display-mode: fullscreen)')?.matches;
    root.classList.add('sun-pwa-capable');
    root.classList.toggle('sun-pwa-standalone', standalone);
    root.dataset.pwaDisplayMode = standalone ? 'standalone' : 'browser';
})();
</script>
<link rel="stylesheet" href="{{ asset_url('pages/pwa.css') }}">
<script type="module" src="{{ asset_url('modules/pwa-runtime.js') }}" nonce="{{ csp_nonce }}"></script>
