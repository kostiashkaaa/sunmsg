    function asObject(value) {
        return value && typeof value === 'object' && !Array.isArray(value) ? value : {};
    }

    function asLanguage(value) {
        return String(value ?? '').trim().toLowerCase() === 'en' ? 'en' : 'ru';
    }

    function asThemeKey(value) {
        return value === 'dark' ? 'dark' : 'light';
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function normalizeHex(value) {
        if (typeof value !== 'string') return null;
        const trimmed = value.trim();
        const shortMatch = trimmed.match(/^#([0-9a-f]{3})$/i);
        if (shortMatch) {
            const short = shortMatch[1].toLowerCase();
            return `#${short[0]}${short[0]}${short[1]}${short[1]}${short[2]}${short[2]}`;
        }
        const fullMatch = trimmed.match(/^#([0-9a-f]{6})$/i);
        if (fullMatch) return `#${fullMatch[1].toLowerCase()}`;
        return null;
    }

    function hexToRgb(hex) {
        const normalized = normalizeHex(hex);
        if (!normalized) return null;
        const n = parseInt(normalized.slice(1), 16);
        return {
            r: (n >> 16) & 255,
            g: (n >> 8) & 255,
            b: n & 255,
        };
    }

    function rgbToHex(rgb) {
        const r = clamp(Math.round(rgb.r), 0, 255).toString(16).padStart(2, '0');
        const g = clamp(Math.round(rgb.g), 0, 255).toString(16).padStart(2, '0');
        const b = clamp(Math.round(rgb.b), 0, 255).toString(16).padStart(2, '0');
        return `#${r}${g}${b}`;
    }

    function mixColors(colorA, colorB, weightToB) {
        const a = hexToRgb(colorA) || { r: 0, g: 0, b: 0 };
        const b = hexToRgb(colorB) || { r: 0, g: 0, b: 0 };
        const w = clamp(Number(weightToB || 0), 0, 1);
        return rgbToHex({
            r: a.r * (1 - w) + b.r * w,
            g: a.g * (1 - w) + b.g * w,
            b: a.b * (1 - w) + b.b * w,
        });
    }

    function rgbaFromHex(hex, alpha) {
        const rgb = hexToRgb(hex) || { r: 0, g: 0, b: 0 };
        return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${clamp(Number(alpha || 0), 0, 1).toFixed(3)})`;
    }

    function applyCssVars(root, cssVars) {
        Object.entries(asObject(cssVars)).forEach(([name, value]) => {
            if (!name || typeof name !== 'string' || !name.startsWith('--')) return;
            if (typeof value !== 'string' && typeof value !== 'number') return;
            root.style.setProperty(name, String(value));
        });
    }

    function applyStoredSidebarWidth(root) {
        try {
            const raw = localStorage.getItem(SIDEBAR_WIDTH_STORAGE_KEY);
            if (raw === null || raw === '') return;
            const parsed = Number.parseInt(raw, 10);
            if (!Number.isFinite(parsed)) return;
            const safe = clamp(parsed, SIDEBAR_WIDTH_MIN, SIDEBAR_WIDTH_MAX);
            root.style.setProperty('--sidebar-width', `${safe}px`);
        } catch (_error) {
            // Ignore storage read errors.
        }
    }

    function normalizeLegacyPresetId(value, expectedMode) {
        const id = typeof value === 'string' ? value.trim() : '';
        if (!id) return null;
        const preset = LEGACY_PRESET_MAP[id];
        if (!preset) return null;
        if (expectedMode && preset.mode !== expectedMode) return null;
        return id;
    }

    function readLegacyInterfaceStore() {
        try {
            const raw = localStorage.getItem(INTERFACE_THEME_STORAGE_KEY);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            return asObject(parsed);
        } catch (_error) {
            return {};
        }
    }

    function readLegacyChatAppearanceStore() {
        try {
            const raw = localStorage.getItem(CHAT_APPEARANCE_STORAGE_KEY);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            return asObject(parsed);
        } catch (_error) {
            return {};
        }
    }

    function resolveLegacyPreset(themeKey) {
        const key = asThemeKey(themeKey);
        const store = readLegacyInterfaceStore();
        const modePresets = asObject(store.modePresets);
        const activePresetId = normalizeLegacyPresetId(store.activePresetId, key);
        if (activePresetId) return LEGACY_PRESET_MAP[activePresetId] || null;

        const modePresetId = normalizeLegacyPresetId(modePresets[key], key);
        if (modePresetId) return LEGACY_PRESET_MAP[modePresetId] || null;

        return LEGACY_PRESET_MAP[LEGACY_DEFAULT_PRESET_BY_MODE[key]] || null;
    }

    function resolveLegacyThemeModeHint() {
        const store = readLegacyInterfaceStore();
        const activeDarkPresetId = normalizeLegacyPresetId(store.activePresetId, 'dark');
        if (activeDarkPresetId) return 'dark';
        const activeLightPresetId = normalizeLegacyPresetId(store.activePresetId, 'light');
        if (activeLightPresetId) return 'light';
        return null;
    }

    function applyLegacyInterfacePreset(root, themeKey) {
        const preset = resolveLegacyPreset(themeKey);
        if (!preset || !preset.vars) return;
        applyCssVars(root, preset.vars);
    }

    function applyLegacyInterfaceAccent(root, themeKey) {
        const key = asThemeKey(themeKey);
        const store = readLegacyInterfaceStore();
        const themes = asObject(store.themes);
        const themeState = asObject(themes[key]);
        const accent = normalizeHex(themeState.accent) || LEGACY_DEFAULT_ACCENT_BY_MODE[key];
        const hover = key === 'dark'
            ? mixColors(accent, '#ffffff', 0.18)
            : mixColors(accent, '#000000', 0.2);
        const bright = key === 'dark'
            ? mixColors(accent, '#ffffff', 0.32)
            : mixColors(accent, '#ffffff', 0.24);
        const light = key === 'dark'
            ? mixColors(accent, '#0b1f21', 0.72)
            : mixColors(accent, '#ffffff', 0.86);
        const glow = rgbaFromHex(accent, key === 'dark' ? 0.24 : 0.2);
        const gradient = `linear-gradient(135deg, ${accent} 0%, ${bright} 100%)`;

        applyCssVars(root, {
            '--accent': accent,
            '--accent-hover': hover,
            '--accent-bright': bright,
            '--accent-light': light,
            '--accent-glow': glow,
            '--accent-gradient': gradient,
        });
    }

    function buildLegacyChatWallpaper(themeKey) {
        const key = asThemeKey(themeKey);
        const store = readLegacyChatAppearanceStore();
        const themes = asObject(store.themes);
        const state = asObject(themes[key]);
        const mode = String(state.mode || 'default').trim();

        if (mode === 'preset') {
            const preset = LEGACY_CHAT_PRESET_MAP[String(state.presetId || '').trim()];
            if (preset) {
                if (preset.mode === 'color') {
                    return {
                        '--chat-wallpaper-base': preset.color,
                        '--chat-wallpaper-image': 'none',
                        '--chat-wallpaper-size': 'auto',
                        '--chat-wallpaper-position': 'center center',
                        '--chat-wallpaper-repeat': 'no-repeat',
                        '--chat-wallpaper-opacity': '1',
                        '--chat-wallpaper-blur': '0px',
                        '--chat-wallpaper-dim': '0',
                    };
                }
                if (preset.mode === 'gradient') {
                    return {
                        '--chat-wallpaper-base': 'transparent',
                        '--chat-wallpaper-image': preset.gradient,
                        '--chat-wallpaper-size': 'cover',
                        '--chat-wallpaper-position': 'center center',
                        '--chat-wallpaper-repeat': 'no-repeat',
                        '--chat-wallpaper-opacity': '1',
                        '--chat-wallpaper-blur': '0px',
                        '--chat-wallpaper-dim': '0',
                    };
                }
                if (preset.mode === 'pattern') {
                    return {
                        '--chat-wallpaper-base': preset.baseColor || 'var(--chat-bg)',
                        '--chat-wallpaper-image': preset.pattern || 'none',
                        '--chat-wallpaper-size': preset.size || 'auto',
                        '--chat-wallpaper-position': 'center center',
                        '--chat-wallpaper-repeat': preset.repeat || 'repeat',
                        '--chat-wallpaper-opacity': '1',
                        '--chat-wallpaper-blur': '0px',
                        '--chat-wallpaper-dim': '0',
                    };
                }
                if (preset.mode === 'texture') {
                    return {
                        '--chat-wallpaper-base': preset.baseColor || 'var(--chat-bg)',
                        '--chat-wallpaper-image': preset.texture || 'none',
                        '--chat-wallpaper-size': preset.size || 'auto',
                        '--chat-wallpaper-position': 'center center',
                        '--chat-wallpaper-repeat': preset.repeat || 'repeat',
                        '--chat-wallpaper-opacity': '1',
                        '--chat-wallpaper-blur': '0px',
                        '--chat-wallpaper-dim': '0',
                    };
                }
            }
        }

        if (mode === 'color') {
            const color = String(state.color || '').trim() || (key === 'dark' ? '#141920' : '#eef2f8');
            return {
                '--chat-wallpaper-base': color,
                '--chat-wallpaper-image': 'none',
                '--chat-wallpaper-size': 'auto',
                '--chat-wallpaper-position': 'center center',
                '--chat-wallpaper-repeat': 'no-repeat',
                '--chat-wallpaper-opacity': '1',
                '--chat-wallpaper-blur': '0px',
                '--chat-wallpaper-dim': '0',
            };
        }

        if (mode === 'gradient') {
            const a = String(state.gradientA || '').trim() || (key === 'dark' ? '#131a24' : '#f3f6fb');
            const b = String(state.gradientB || '').trim() || (key === 'dark' ? '#10151e' : '#e7edf6');
            return {
                '--chat-wallpaper-base': 'transparent',
                '--chat-wallpaper-image': `linear-gradient(135deg, ${a} 0%, ${b} 100%)`,
                '--chat-wallpaper-size': 'cover',
                '--chat-wallpaper-position': 'center center',
                '--chat-wallpaper-repeat': 'no-repeat',
                '--chat-wallpaper-opacity': '1',
                '--chat-wallpaper-blur': '0px',
                '--chat-wallpaper-dim': '0',
            };
        }

        if (mode === 'custom') {
            const custom = asObject(state.custom);
            const imageDataUrl = String(custom.imageDataUrl || '').trim();
            if (imageDataUrl) {
                const scale = clamp(Number.parseFloat(String(custom.scale || '100')) || 100, 30, 240);
                const repeat = Boolean(custom.repeat);
                const opacity = clamp(Number.parseFloat(String(custom.opacity || '1')) || 1, 0.2, 1);
                const blur = clamp(Number.parseFloat(String(custom.blur || '0')) || 0, 0, 18);
                const darken = clamp(Number.parseFloat(String(custom.darken || (key === 'dark' ? '18' : '8'))) || 0, 0, 70);
                const customSize = repeat
                    ? `${Math.round(scale * 0.9)}px ${Math.round(scale * 0.9)}px`
                    : `min(${scale}vw, 1800px) auto`;
                return {
                    '--chat-wallpaper-base': key === 'dark' ? '#0f131a' : '#edf2f7',
                    '--chat-wallpaper-image': `url("${imageDataUrl}")`,
                    '--chat-wallpaper-size': customSize,
                    '--chat-wallpaper-position': String(custom.position || 'center center'),
                    '--chat-wallpaper-repeat': repeat ? 'repeat' : 'no-repeat',
                    '--chat-wallpaper-opacity': String(opacity),
                    '--chat-wallpaper-blur': `${blur.toFixed(1)}px`,
                    '--chat-wallpaper-dim': String(clamp(darken / 100, 0, 0.75)),
                };
            }
        }

        return {
            '--chat-wallpaper-base': 'var(--chat-bg)',
            '--chat-wallpaper-image': 'none',
            '--chat-wallpaper-size': 'cover',
            '--chat-wallpaper-position': 'center center',
            '--chat-wallpaper-repeat': 'no-repeat',
            '--chat-wallpaper-opacity': '1',
            '--chat-wallpaper-blur': '0px',
            '--chat-wallpaper-dim': '0',
        };
    }

    function applyLegacyChatWallpaper(root, themeKey) {
        applyCssVars(root, buildLegacyChatWallpaper(themeKey));
    }

    function readStoredDarkModeFlag() {
        try {
            const raw = localStorage.getItem('darkMode');
            if (raw === 'true') return true;
            if (raw === 'false') return false;
        } catch (_error) {
            // Ignore storage read errors.
        }
        return null;
    }

    function applyBootState(rawBoot, rawPreferences) {
        const boot = asObject(rawBoot);
        const preferences = asObject(rawPreferences);
        const root = document.documentElement;
        if (!root) return;

        applyStoredSidebarWidth(root);

        const storedDarkMode = readStoredDarkModeFlag();
        const darkMode = storedDarkMode !== null
            ? storedDarkMode
            : (typeof boot.darkMode === 'boolean'
            ? boot.darkMode
            : (typeof preferences.darkMode === 'boolean' ? preferences.darkMode : null));
        if (darkMode !== null) {
            root.classList.toggle('dark-mode', darkMode);
        }

        const cssVars = asObject(boot.cssVars);
        const themeKey = root.classList.contains('dark-mode') ? 'dark' : 'light';
        if (Object.keys(cssVars).length > 0) {
            applyCssVars(root, cssVars);
        } else {
            applyLegacyInterfacePreset(root, themeKey);
            applyLegacyInterfaceAccent(root, themeKey);
            applyLegacyChatWallpaper(root, themeKey);
        }

        if (!Object.prototype.hasOwnProperty.call(cssVars, '--accent')) {
            applyLegacyInterfaceAccent(root, themeKey);
        }
        if (!Object.prototype.hasOwnProperty.call(cssVars, '--chat-wallpaper-base')) {
            applyLegacyChatWallpaper(root, themeKey);
        }

        const language = asLanguage(
            boot.language || preferences.language || root.getAttribute('lang') || 'ru',
        );
        root.setAttribute('lang', language);
        try {
            localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
        } catch (_error) {
            // Ignore storage write errors.
        }
    }

    function applyLegacyFallback() {
        const root = document.documentElement;
        if (!root) return;
        applyStoredSidebarWidth(root);
        try {
            const storedDark = localStorage.getItem('darkMode');
            if (storedDark === 'true') root.classList.add('dark-mode');
            if (storedDark === 'false') root.classList.remove('dark-mode');
            if (storedDark !== 'true' && storedDark !== 'false') {
                const modeHint = resolveLegacyThemeModeHint();
                if (modeHint === 'dark') root.classList.add('dark-mode');
                if (modeHint === 'light') root.classList.remove('dark-mode');
            }
            const themeKey = root.classList.contains('dark-mode') ? 'dark' : 'light';
            applyLegacyInterfacePreset(root, themeKey);
            applyLegacyInterfaceAccent(root, themeKey);
            applyLegacyChatWallpaper(root, themeKey);
            const language = asLanguage(
                localStorage.getItem(LANGUAGE_STORAGE_KEY) || root.getAttribute('lang') || 'ru',
            );
            root.setAttribute('lang', language);
        } catch (_error) {
            // Ignore storage read errors.
        }
    }

    function syncServerThemePreferencesIntoStorage() {
        const server = asObject(SERVER_CLIENT_PREFERENCES);
        if (Object.keys(server).length === 0) return;
        try {
            let touched = false;

            if (typeof server.darkMode === 'boolean') {
                localStorage.setItem('darkMode', server.darkMode ? 'true' : 'false');
                touched = true;
            }

            if (Object.prototype.hasOwnProperty.call(server, 'language')) {
                const language = asLanguage(server.language);
                localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
                touched = true;
            }

            const interfaceThemeStore = asObject(server.interfaceThemeStore);
            if (Object.keys(interfaceThemeStore).length > 0) {
                localStorage.setItem(INTERFACE_THEME_STORAGE_KEY, JSON.stringify(interfaceThemeStore));
                touched = true;
            }

            const chatAppearanceStore = asObject(server.chatAppearanceStore);
            if (Object.keys(chatAppearanceStore).length > 0) {
                localStorage.setItem(CHAT_APPEARANCE_STORAGE_KEY, JSON.stringify(chatAppearanceStore));
                touched = true;
            }

            if (touched) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(server));
            }
        } catch (_error) {
            // Ignore storage write errors.
        }
    }

    try {
        syncServerThemePreferencesIntoStorage();
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
            applyLegacyFallback();
            return;
        }
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') {
            applyLegacyFallback();
            return;
        }
        applyBootState(parsed.boot, parsed);
    } catch (_error) {
        applyLegacyFallback();
    }
})();
</script>
