    function asObject(value) {
        return value && typeof value === 'object' && !Array.isArray(value) ? value : {};
    }

    function asLanguage(value) {
        return String(value ?? '').trim().toLowerCase() === 'en' ? 'en' : 'ru';
    }

    function asThemeKey(value) {
        return value === 'dark' ? 'dark' : 'light';
    }

    function applyCssVars(root, cssVars) {
        Object.entries(asObject(cssVars)).forEach(([name, value]) => {
            if (!name || typeof name !== 'string' || !name.startsWith('--')) return;
            if (typeof value !== 'string' && typeof value !== 'number') return;
            root.style.setProperty(name, String(value));
        });
    }

    function normalizeLegacyPresetId(value, expectedMode) {
        const id = typeof value === 'string' ? value.trim() : '';
        if (!id) return null;
        const preset = LEGACY_PRESET_MAP[id];
        if (!preset) return null;
        if (expectedMode && preset.mode !== expectedMode) return null;
        return id;
    }

    function readLegacyInterfaceStore() {
        try {
            const raw = localStorage.getItem(INTERFACE_THEME_STORAGE_KEY);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            return asObject(parsed);
        } catch (_error) {
            return {};
        }
    }

    function resolveLegacyPreset(themeKey) {
        const key = asThemeKey(themeKey);
        const store = readLegacyInterfaceStore();
        const modePresets = asObject(store.modePresets);
        const activePresetId = normalizeLegacyPresetId(store.activePresetId, key);
        if (activePresetId) return LEGACY_PRESET_MAP[activePresetId] || null;

        const modePresetId = normalizeLegacyPresetId(modePresets[key], key);
        if (modePresetId) return LEGACY_PRESET_MAP[modePresetId] || null;

        return LEGACY_PRESET_MAP[LEGACY_DEFAULT_PRESET_BY_MODE[key]] || null;
    }

    function resolveLegacyThemeModeHint() {
        const store = readLegacyInterfaceStore();
        const activeDarkPresetId = normalizeLegacyPresetId(store.activePresetId, 'dark');
        if (activeDarkPresetId) return 'dark';
        const activeLightPresetId = normalizeLegacyPresetId(store.activePresetId, 'light');
        if (activeLightPresetId) return 'light';
        return null;
    }

    function applyLegacyInterfacePreset(root, themeKey) {
        const preset = resolveLegacyPreset(themeKey);
        if (!preset || !preset.vars) return;
        applyCssVars(root, preset.vars);
    }

    function applyBootState(rawBoot, rawPreferences) {
        const boot = asObject(rawBoot);
        const preferences = asObject(rawPreferences);
        const root = document.documentElement;
        if (!root) return;

        const darkMode = typeof boot.darkMode === 'boolean'
            ? boot.darkMode
            : (typeof preferences.darkMode === 'boolean' ? preferences.darkMode : null);
        if (darkMode !== null) {
            root.classList.toggle('dark-mode', darkMode);
        }

        const cssVars = asObject(boot.cssVars);
        if (Object.keys(cssVars).length > 0) {
            applyCssVars(root, cssVars);
        } else {
            applyLegacyInterfacePreset(root, root.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        const language = asLanguage(
            boot.language || preferences.language || root.getAttribute('lang') || 'ru',
        );
        root.setAttribute('lang', language);
        try {
            localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
        } catch (_error) {
            // Ignore storage write errors.
        }
    }

    function applyLegacyFallback() {
        const root = document.documentElement;
        if (!root) return;
        try {
            const storedDark = localStorage.getItem('darkMode');
            if (storedDark === 'true') root.classList.add('dark-mode');
            if (storedDark === 'false') root.classList.remove('dark-mode');
            if (storedDark !== 'true' && storedDark !== 'false') {
                const modeHint = resolveLegacyThemeModeHint();
                if (modeHint === 'dark') root.classList.add('dark-mode');
                if (modeHint === 'light') root.classList.remove('dark-mode');
            }
            applyLegacyInterfacePreset(root, root.classList.contains('dark-mode') ? 'dark' : 'light');
            const language = asLanguage(
                localStorage.getItem(LANGUAGE_STORAGE_KEY) || root.getAttribute('lang') || 'ru',
            );
            root.setAttribute('lang', language);
        } catch (_error) {
            // Ignore storage read errors.
        }
    }

    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
            applyLegacyFallback();
            return;
        }
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') {
            applyLegacyFallback();
            return;
        }
        applyBootState(parsed.boot, parsed);
    } catch (_error) {
        applyLegacyFallback();
    }
