<div id="contactContextMenu" class="context-menu sun-popup" aria-hidden="true" role="menu">
    <button type="button" class="context-menu-item ripple-target" id="ctxPinChat" role="menuitem">
        <i class="bi bi-pin-angle-fill"></i> Закрепить
    </button>
    <button type="button" class="context-menu-item ripple-target" id="ctxUnpinChat" role="menuitem" hidden>
        <i class="bi bi-pin-angle"></i> Открепить
    </button>
    <button type="button" class="context-menu-item ripple-target" id="ctxToggleMuteChat" role="menuitem" aria-pressed="false">
        <i class="bi bi-bell-slash"></i> <span>Отключить уведомления</span>
    </button>
    <button type="button" class="context-menu-item ripple-target" id="ctxAddToFolder" role="menuitem">
        <i class="bi bi-folder2-open"></i> <span>В папку...</span>
    </button>
    <button type="button" class="context-menu-item ripple-target danger" id="ctxDeleteChat" role="menuitem">
        <i class="bi bi-trash3"></i> Удалить чат
    </button>
</div>

<div id="messageContextMenu" class="context-menu sun-popup" aria-hidden="true" role="menu">
    <div class="context-menu-divider" id="cmReactionDivider" hidden></div>
    <div class="context-menu-read-info" id="cmReadInfo" hidden>
        <i class="bi bi-check2-all context-menu-read-info__tick" aria-hidden="true"></i>
        <span class="context-menu-read-info__text">22 апр. в 19:45:00</span>
    </div>
    <button type="button" class="context-menu-item ripple-target" id="cmReply" role="menuitem">
        <i class="bi bi-reply-fill"></i> Ответить
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmCopy" role="menuitem">
        <i class="bi bi-clipboard"></i> Копировать
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmEdit" role="menuitem">
        <i class="bi bi-pencil"></i> Редактировать
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmPin" role="menuitem">
        <i class="bi bi-pin-angle"></i> Закрепить
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmFavorite" role="menuitem">
        <i class="bi bi-star"></i> В избранное
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmForward" role="menuitem">
        <i class="bi bi-forward-fill"></i> Переслать
    </button>
    <button type="button" class="context-menu-item ripple-target" id="cmSelect" role="menuitem">
        <span class="sun-check-glyph sun-check-glyph--single sun-check-glyph--ui" aria-hidden="true"><svg viewBox="0 0 10 10" focusable="false"><path d="M1.2 5.2L4 8L8.8 2.2"></path></svg></span> Выбрать
    </button>
    <button type="button" class="context-menu-item ripple-target danger" id="cmReport" role="menuitem">
        <i class="bi bi-flag"></i> Пожаловаться
    </button>
    <button type="button" class="context-menu-item ripple-target danger" id="cmDelete" role="menuitem">
        <i class="bi bi-trash3"></i> Удалить
    </button>
    <button type="button" class="context-menu-item ripple-target danger" id="cmDeleteForAll" role="menuitem" hidden>
        <i class="bi bi-trash3-fill"></i> Удалить для всех
    </button>
</div>
